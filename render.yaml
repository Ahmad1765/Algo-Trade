# Render Blueprint — Algo-Trade live dashboard (paper-trading demo)
# Deploys the Python aiohttp engine + built-in dashboard as a single Docker web service.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: algo-trade-dashboard
    runtime: docker
    plan: free
    branch: main
    rootDir: algo-trade
    # dockerfilePath is relative to the REPO ROOT (not rootDir), per Render spec.
    dockerfilePath: algo-trade/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MODE
        value: paper            # paper-trading: simulated orders, no real money, no API keys
      - key: PYTHONUNBUFFERED
        value: "1"
      # Render injects PORT automatically; the entrypoint binds to it on 0.0.0.0.
      # For live screener data instead of mock, add FMP_API_KEY in the Render dashboard.
      #
      # Secrets — set these in the Render dashboard; never commit real values.
      - key: DASHBOARD_PASSWORD   # required: login password for the dashboard
        sync: false
      - key: SESSION_SECRET       # auto-generated by Render; used to sign session cookies
        generateValue: true
      - key: DATABASE_URL         # Supabase direct conn: postgresql://...@db.<ref>.supabase.co:5432/postgres?sslmode=require
        sync: false
