# Render Blueprint — Algo-Trade live dashboard (paper-trading demo)
# Deploys the Python aiohttp engine + built-in dashboard as a single Docker web service.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: algo-trade-dashboard
    runtime: docker
    plan: free
    branch: test
    rootDir: algo-trade
    # dockerfilePath is relative to the REPO ROOT (not rootDir), per Render spec.
    dockerfilePath: algo-trade/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: MODE
        value: paper            # paper-trading: simulated orders, no real money, no API keys
      - key: PYTHONUNBUFFERED
        value: "1"
      # Render injects PORT automatically; the entrypoint binds to it on 0.0.0.0.
      # For live screener data instead of mock, add FMP_API_KEY in the Render dashboard.
